<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks | KO Savant</title>
  <meta name="description" content="Thanks for reaching out to KO Savant." />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070807;
      --surface: #121413;
      --border: rgba(255,255,255,0.08);
      --text: #f4f6f5;
      --muted: #9aa19e;
      --accent: #2bd946;
      --font-display: 'Clash Display', 'Helvetica Neue', sans-serif;
      --font-body: 'Satoshi', 'Inter', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(43,217,70,0.12), transparent 30%),
        linear-gradient(180deg, #090a09, #050605 68%);
      color: var(--text);
      font-family: var(--font-body);
    }
    .card {
      width: min(100%, 680px);
      background: rgba(18,20,19,0.92);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: clamp(28px, 5vw, 48px);
      box-shadow: 0 28px 80px rgba(0,0,0,0.35);
    }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 14px;
      font-family: var(--font-display);
      font-size: clamp(2.25rem, 6vw, 4rem);
      line-height: 0.95;
    }
    p {
      margin: 0;
      line-height: 1.7;
      color: var(--muted);
      max-width: 46rem;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      transition: transform .18s ease, opacity .18s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn--primary { background: var(--accent); color: #081108; }
    .btn--secondary { border: 1px solid var(--border); color: var(--text); }
    .note {
      margin-top: 18px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow" id="eyebrow">Request received</div>
    <h1 id="title">Thanks — your message is in.</h1>
    <p id="copy">KO Savant has your submission. If this was a consultation request or feedback update, it was sent successfully and will be reviewed shortly.</p>
    <div class="actions">
      <a class="btn btn--primary" href="https://kosavant.com/">Back to site</a>
      <a class="btn btn--secondary" href="https://www.instagram.com/k.o._savant" target="_blank" rel="noopener noreferrer">Instagram</a>
    </div>
    <p class="note">If you need something urgent, email contact@kosavant.com.</p>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const source = params.get('source');
    const eyebrow = document.getElementById('eyebrow');
    const title = document.getElementById('title');
    const copy = document.getElementById('copy');
    if (source === 'feedback') {
      eyebrow.textContent = 'Feedback received';
      title.textContent = 'Thanks for the update.';
      copy.textContent = 'Your feedback was sent successfully. If you gave permission to feature it, KO Savant can review it and add it to the site later.';
    } else if (source === 'booking') {
      eyebrow.textContent = 'Consultation request sent';
      title.textContent = 'You are booked in.';
      copy.textContent = 'Your consultation request was sent successfully. Expect a reply from KO Savant within 24 hours.';
    }
  </script>
</body>
</html>
